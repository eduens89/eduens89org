    <style>
        :root { --purple: #210d41; --cream-dark: #f2ead3; --green: #a2c8ab; --muted: #7a6e88; }
        body { background: var(--cream-dark); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; color: var(--purple); }
        
        header { background: var(--purple); color: #fdf9ee; padding: 0.6rem 2rem; position: sticky; top: 0; z-index: 10; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 90px; width: auto; }
        .logo { font-family: Georgia, serif; font-size: 1.5rem; font-weight: bold; }
        
        .nav-cats { background: var(--purple); overflow-x: auto; white-space: nowrap; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        .nav-cats button { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; cursor: pointer; border-radius: 20px; transition: 0.3s; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .nav-cats button.active { background: var(--green); color: var(--purple); border-color: var(--green); font-weight: bold; }
        .count-badge { background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 10px; font-size: 11px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 2rem; max-width: 1200px; margin: 0 auto; min-height: 50vh; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(33,13,65,0.12); transition: 0.3s; cursor: pointer; border: 1px solid rgba(33,13,65,0.05); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(33,13,65,0.2); }
        .card-img { height: 210px; width: 100%; object-fit: cover; background: #eee; }
        .card-content { padding: 20px; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--purple); }
        .item-date { font-size: 11px; color: var(--muted); }

        /* Styles du Nouveau Pied de Page (Footer) */
        footer { background: var(--purple); color: #fdf9ee; padding: 4rem 2rem; margin-top: 4rem; border-top: 4px solid var(--green); }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .footer-title { font-family: Georgia, serif; color: var(--green); font-size: 1.2rem; margin-bottom: 1.2rem; font-weight: bold; border-bottom: 1px solid rgba(162, 200, 171, 0.3); padding-bottom: 8px; display: inline-block; }
        .footer-col p { margin: 8px 0; font-size: 14px; line-height: 1.6; opacity: 0.9; }
        .hours-list { list-style: none; padding: 0; margin: 0; font-size: 14px; }
        .hours-list li { margin-bottom: 6px; display: flex; justify-content: space-between; }
        .day { font-weight: bold; color: var(--green); width: 80px; display: inline-block; }

        .info-banner { background: var(--purple); color: #fdf9ee; padding: 10px 2rem 12px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.1); }
        .info-banner-text { font-size: 13px; flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 6px 18px; line-height: 1.5; opacity: 0.92; text-align: center; }
        .info-banner-text strong { width: 100%; text-align: center; }
        .info-banner-text span { width: 100%; text-align: center; }
        .info-banner-text strong { color: var(--green); font-size: 14px; }

    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- NOUVEAUX LIENS GOOGLE ---
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREXXW0wE12HS6P_2zK--2Rmmo9B6mTOjfecrdJHoR4xkwHYbtCqJCDvw0FbQMH7JrDNnF_-7msa_i7/pub?gid=0&single=true&output=csv";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwv8ygZBVSv1BZ-Xn0ymoYfLkADkClhAnnlBttLp_xy2eoiBisDaV01uXJjl6sCNvIWhQ/exec";

        // --- FONCTION DE LECTURE GOOGLE SHEETS ---
        function getPhotoUrl(val) {
            if (!val) return "https://placehold.co/400x300?text=Photo+à+venir";
            val = val.trim().replace(/^"|"$/g, ""); 
            if (val.startsWith("http") && !val.includes("drive.google.com")) return val;
            if (val.includes("drive.google.com")) {
                const parts = val.match(/\/d\/([^\/]+)/) || val.match(/id=([^&]+)/);
                if (parts && parts[1]) return `https://drive.google.com/thumbnail?id=${parts[1]}&sz=w600`;
            }
            return `https://drive.google.com/thumbnail?id=${val}&sz=w600`;
        }

        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (char === '"') {
                    if (inQuotes && nextChar === '"') { currentCell += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++; 
                    if (currentCell !== "" || currentRow.length > 0) {
                        currentRow.push(currentCell.trim());
                        rows.push(currentRow);
                        currentRow = [];
                        currentCell = "";
                    }
                } else { currentCell += char; }
            }
            if (currentRow.length > 0 || currentCell !== "") {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }
            if (rows.length < 2) return [];
            const headers = rows[0].map(h => h.replace(/^\ufeff/, "").replace(/^"|"$/g, "").trim());
            
            return rows.slice(1).map((row, idx) => {
                const obj = { _row: idx + 2 };
                headers.forEach((h, i) => {
                    obj[h] = (row[i] || "").replace(/^"|"$/g, "").trim();
                });
                
                // Mappage Airtable pour que ton design marche tout seul
                const imageUrl = getPhotoUrl(obj["Photos"] || "");
                obj.Photos = [{ url: imageUrl }]; 
                obj.DateCreation = obj["DateCreation"] || obj["Date"] || obj["date"] || "";
                
                return obj;
            }).filter(o => o["Titre"]);
        }

        function App() {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState("Tout");
            const [selected, setSelected] = useState(null);

            // --- ETATS ADMIN ---
            const [adminPassword, setAdminPassword] = useState("");
            const [deletingId, setDeletingId] = useState(null);

            const loadData = () => {
                fetch(SHEET_CSV)
                    .then(res => res.text())
                    .then(text => { 
                        let data = parseCSV(text);
                        setItems(data.reverse()); 
                        setLoading(false); 
                    })
                    .catch(err => setLoading(false));
            };

            useEffect(() => {
                loadData();
            }, []);

            // --- LOGIQUE SUPPRESSION ---
            const handleAdminToggle = () => {
                if (adminPassword) {
                    setAdminPassword("");
                } else {
                    const pwd = window.prompt("🔑 Entrez le mot de passe administrateur :");
                    if (pwd) setAdminPassword(pwd);
                }
            };

            const handleDelete = async (e, item) => {
                e.stopPropagation(); 
                if (!window.confirm(`⚠️ Attention : Voulez-vous vraiment supprimer "${item.Titre}" ?`)) return;

                setDeletingId(item._row);

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "delete", row: item._row, password: adminPassword })
                    });
                    const result = await response.json();

                    if (result.status === "success") {
                        setItems(prevItems => prevItems.filter(i => i._row !== item._row));
                        alert("✅ L'article a été supprimé !");
                        loadData(); 
                    } else {
                        alert("❌ Erreur : " + (result.message || "Mot de passe incorrect ?"));
                        if (result.message === "Mot de passe incorrect !") setAdminPassword("");
                    }
                } catch (err) {
                    alert("❌ Erreur réseau.");
                }
                setDeletingId(null);
            };

            const categories = ["Tout", ...new Set(items.map(i => i.Categorie).filter(Boolean))];
            const filtered = filter === "Tout" ? items : items.filter(i => i.Categorie === filter);

            const formatDate = (dateStr) => {
                if (!dateStr) return "";
                return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
            };

            if (loading) return <div style={{padding: "100px", textAlign: "center", color: "var(--purple)"}}>Chargement du catalogue...</div>;

                        </div>
                    <button onClick={handleAdminToggle} style={{background: 'transparent', border: 'none', fontSize: '24px', cursor: 'pointer', marginLeft: 'auto', zIndex: 100}}>
    {adminPassword ? '🔓' : '🔒'}
</button></header>
                    
                    <div className="info-banner">
                        <div className="info-banner-text">
                            <strong>Retrouvez notre catalogue de mobiliers et puériculture !</strong>
                            <span>Si un élément vous intéresse, il suffit de nous le demander en caisse lors de votre passage à la boutique et nous irons vous le chercher dans notre stockage !</span>
                            <span className="info-banner-warning">⚠️ Nous ne prenons cependant aucune réservation en ligne (pour des questions logistiques et de temps), merci de votre compréhension. ⚠️</span>
                        </div>
                    </div>

                    <div className="nav-cats">
                        {categories.map(c => {
                            const count = c === "Tout" ? items.length : items.filter(i => i.Categorie === c).length;
                            return (
                                <button key={c} className={filter === c ? 'active' : ''} onClick={() => setFilter(c)}>
                                    {c} <span className="count-badge">{count}</span>
                                </button>
                            );
                        })}
                    </div>

                    <main className="grid">
                        {filtered.map((item, index) => (
                            <div key={item._row || index} className="card" onClick={() => setSelected(item)} style={{position: 'relative'}}>
                                
                                {/* --- BOUTON POUBELLE --- */}
                                {adminPassword && (
                                    <button 
                                        onClick={(e) => handleDelete(e, item)} 
                                        disabled={deletingId === item._row} 
                                        style={{position: 'absolute', top: '10px', right: '10px', background: '#d32f2f', color: 'white', border: 'none', borderRadius: '6px', padding: '6px 12px', cursor: 'pointer', zIndex: 10, fontWeight: 'bold'}}
                                    >
                                        {deletingId === item._row ? '⏳...' : '🗑️ Supprimer'}
                                    </button>
                                )}
                                {/* ----------------------- */}

                                <img className="card-img" src={item.Photos?.[0]?.url || 'https://via.placeholder.com/400x300?text=Photo+à+venir'} />
                                <div className="card-content">
                                    <div style={{fontSize: '11px', color: 'var(--muted)', fontWeight: 'bold'}}>{item.Categorie}</div>
                                    <div style={{fontWeight: '700', fontSize: '1.2rem', margin: '8px 0'}}>{item.Titre}</div>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginTop: '10px'}}>
                                        <div className="price">{item.Prix ? `${item.Prix} €` : "Prix libre"}</div>
                                        <div className="item-date">{formatDate(item.DateCreation)}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* PIED DE PAGE AVEC INFOS image_004f4b.png */}
                    <footer>
                        <div className="footer-grid">
                            <div className="footer-col">
                                <div className="footer-title">Nous trouver</div>
                                <p style={{fontWeight: 'bold', fontSize: '1.1rem'}}>Recycl'en Gare</p>
                                <p>21 avenue de la gare<br/>89270 Vermenton</p>
                                <p style={{marginTop: '20px'}}><span className="day">Email :</span> contact@recyclengare.org</p>
                                <p><span className="day">Tél :</span> 07 44 98 27 20</p>
                            </div>

                            <div className="footer-col">
                                <div className="footer-title">Horaires d'ouvertures</div>
                                <ul className="hours-list">
                                    <li><span><span className="day">Mercredi</span> 9h30 - 12h30 et 15h30 - 18h30</span></li>
                                    <li><span><span className="day">Vendredi</span> 9h30 - 12h30</span></li>
                                    <li><span><span className="day">Samedi</span> 9h30 - 12h30 et 15h30 - 18h30</span></li>
                                </ul>
                                
                                <div className="footer-title" style={{marginTop: '25px'}}>Horaires dépôts</div>
                                <ul className="hours-list">
                                    <li><span><span className="day">Mercredi</span> 9h30 - 12h30</span></li>
                                    <li><span><span className="day">Samedi</span> 15h30 - 18h30</span></li>
                                </ul>
                            </div>

                            <div className="footer-col" style={{display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center'}}>
                                <div style={{opacity: 0.6, fontSize: '12px', textAlign: 'center'}}>
                                    <p>Soutenu par la commune de Vermenton et la Région Bourgogne Franche-Comté</p>
                                </div>
                            </div>
                        </div>
                        <div style={{textAlign: 'center', marginTop: '3rem', opacity: 0.4, fontSize: '11px', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '20px'}}>
                            © 2026 Recycl'en Gare - Association Loi 1901
                        </div>
                    </footer>

                    {selected && (
                        <div className="modal-overlay" onClick={() => setSelected(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <button className="close-btn" onClick={() => setSelected(null)}>×</button>
                                <img src={selected.Photos?.[0]?.url} style={{width:'100%', height:'400px', objectFit:'cover'}} />
                                <div style={{padding: '30px'}}>
                                    <h2 style={{fontFamily: 'Georgia, serif', fontSize: '2rem', margin: '0 0 10px'}}>{selected.Titre}</h2>
                                    <p style={{lineHeight: '1.6'}}>{selected.Description}</p>
                                    <div className="price" style={{fontSize: '2rem', borderTop: '1px solid #eee', paddingTop: '20px'}}>{selected.Prix ? `${selected.Prix} €` : "Prix libre"}</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
